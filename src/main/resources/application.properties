# Application configuration
server.port=8080
server.error.include-stacktrace=always
server.error.include-message=always

# PostgreSQL Configuration (Force IPv4 for Docker compatibility on Windows)
spring.datasource.url=jdbc:postgresql://127.0.0.1:15432/flashsale_db
spring.datasource.username=host
spring.datasource.password=hostpassword
spring.datasource.driver-class-name=org.postgresql.Driver

# MyBatis Configuration
mybatis.configuration.map-underscore-to-camel-case=true

# Redis configuration
spring.data.redis.host=127.0.0.1
spring.data.redis.port=6379
spring.data.redis.timeout=2000ms

# RabbitMQ configuration
spring.rabbitmq.host=127.0.0.1
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
spring.rabbitmq.listener.simple.acknowledge-mode=auto
spring.rabbitmq.listener.simple.prefetch=20

# Flash sale phase A settings
flashsale.seckill.stock-key-prefix=seckill:stock:
flashsale.seckill.bought-key-prefix=seckill:bought:
flashsale.seckill.result-key-prefix=seckill:result:
flashsale.seckill.result-ttl-seconds=300

# JWT settings
jwt.secret=flashsale_phase_b_secret_key_please_change
jwt.expire-seconds=7200
