server:
  port: 9080

spring:
  application:
    name: flashsale-gateway
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:127.0.0.1:8848}
    gateway:
      server:
        webflux:
          globalcors:
            corsConfigurations:
              '[/**]':
                allowedOrigins: "http://localhost:5173"
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - OPTIONS
                allowedHeaders: "*"
                allowCredentials: true
          routes:
            - id: flashsale-order
              uri: lb://flashsale-order
              predicates:
                - Path=/api/flash-sale/order/**
            - id: flashsale-goods
              uri: lb://flashsale-goods
              predicates:
                - Path=/api/**

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
logging:
  pattern:
    level: "%5p [traceId:%X{traceId}]"

jwt:
  secret: ${JWT_SECRET:flashsale_phase_b_secret_key_please_change}
