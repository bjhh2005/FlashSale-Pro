server:
  port: 9080

spring:
  application:
    name: flashsale-gateway
  cloud:
    gateway:
      server:
        webflux:
          globalcors:
            corsConfigurations:
              '[/**]':
                allowedOrigins: "http://localhost:5173"
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - OPTIONS
                allowedHeaders: "*"
                allowCredentials: true
          routes:
            - id: flashsale-order
              uri: ${ORDER_BASE_URL:http://localhost:8082}
              predicates:
                - Path=/api/flash-sale/order/**
            - id: flashsale-goods
              uri: ${GOODS_BASE_URL:http://localhost:8081}
              predicates:
                - Path=/api/**

management:
  endpoints:
    web:
      exposure:
        include: health,info

jwt:
  secret: ${JWT_SECRET:flashsale_phase_b_secret_key_please_change}
