services:
  postgres:
    image: postgres:15
    container_name: flashsale_postgres
    environment:
      POSTGRES_USER: host
      POSTGRES_PASSWORD: hostpassword
      POSTGRES_DB: flashsale_db
      TZ: Asia/Shanghai
    ports:
      - "15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db:/docker-entrypoint-initdb.d  # Load init scripts like schema.sql
    restart: always
  redis:
    image: redis:7.0
    container_name: flashsale_redis
    ports:
      - "6379:6379"
    restart: always

volumes:
  postgres_data:
