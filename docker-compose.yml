services:
  postgres:
    image: postgres:15
    container_name: flashsale_postgres
    environment:
      POSTGRES_USER: host
      POSTGRES_PASSWORD: hostpassword
      POSTGRES_DB: flashsale_db
      TZ: Asia/Shanghai
    ports:
      - "15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db:/docker-entrypoint-initdb.d  # Load init scripts like schema.sql
    restart: always
  redis:
    image: redis:7.0
    container_name: flashsale_redis
    ports:
      - "6379:6379"
    restart: always
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: flashsale_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
      TZ: Asia/Shanghai
    ports:
      - "5672:5672"
      - "15672:15672"
    restart: always
  gateway:
    build:
      context: ./gateway
    container_name: flashsale_gateway
    environment:
      BACKEND_BASE_URL: http://host.docker.internal:8080
      JWT_SECRET: flashsale_phase_b_secret_key_please_change
      TZ: Asia/Shanghai
    ports:
      - "9080:9080"
    restart: always
  nginx:
    image: ghcr.io/nginxinc/nginx-unprivileged:stable
    container_name: flashsale_nginx
    ports:
      - "80:8080"
    volumes:
      - ./src/main/resources/static:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - gateway
    restart: always

volumes:
  postgres_data:
