services:
  postgres-master:
    image: postgres:15
    container_name: flashsale_postgres_master
    environment:
      POSTGRES_USER: host
      POSTGRES_PASSWORD: hostpassword
      POSTGRES_DB: flashsale_db
      TZ: Asia/Shanghai
    ports:
      - "15432:5432"
    volumes:
      - postgres_master_data:/var/lib/postgresql/data
      - ./db:/docker-entrypoint-initdb.d
    restart: always
  postgres-replica:
    image: postgres:15
    container_name: flashsale_postgres_replica
    environment:
      POSTGRES_USER: host
      POSTGRES_PASSWORD: hostpassword
      POSTGRES_DB: flashsale_db
      TZ: Asia/Shanghai
    ports:
      - "15433:5432"
    volumes:
      - postgres_replica_data:/var/lib/postgresql/data
    depends_on:
      - postgres-master
    restart: always
  redis:
    image: redis:7.0
    container_name: flashsale_redis
    ports:
      - "6379:6379"
    restart: always
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: flashsale_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
      TZ: Asia/Shanghai
    ports:
      - "5672:5672"
      - "15672:15672"
    restart: always
  nacos:
    image: nacos/nacos-server:v2.3.2
    container_name: flashsale_nacos
    environment:
      MODE: standalone
      NACOS_AUTH_ENABLE: "false"
    ports:
      - "8930:8848"
    restart: always
  goods:
    build:
      context: .
      dockerfile: ./flashsale-goods-app/Dockerfile
    container_name: flashsale_goods
    environment:
      SERVER_PORT: 8081
      NACOS_ADDR: nacos:8848
      READ_DATASOURCE_URL: jdbc:postgresql://postgres-replica:5432/flashsale_db
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    depends_on:
      - postgres-master
      - postgres-replica
      - nacos
      - redis
    ports:
      - "8081:8081"
    restart: always
  goods-2:
    build:
      context: .
      dockerfile: ./flashsale-goods-app/Dockerfile
    container_name: flashsale_goods_2
    environment:
      SERVER_PORT: 8083
      NACOS_ADDR: nacos:8848
      READ_DATASOURCE_URL: jdbc:postgresql://postgres-replica:5432/flashsale_db
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    depends_on:
      - postgres-master
      - postgres-replica
      - nacos
      - redis
    ports:
      - "8083:8083"
    restart: always
  order:
    build:
      context: .
      dockerfile: ./flashsale-order-app/Dockerfile
    container_name: flashsale_order
    environment:
      SERVER_PORT: 8082
      NACOS_ADDR: nacos:8848
      ORDER_DATASOURCE_URL: jdbc:postgresql://postgres-master:5432/flashsale_db
      ORDER_DATASOURCE_USERNAME: host
      ORDER_DATASOURCE_PASSWORD: hostpassword
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
    depends_on:
      - postgres-master
      - redis
      - rabbitmq
      - nacos
    ports:
      - "8082:8082"
    restart: always
  stock:
    build:
      context: .
      dockerfile: ./flashsale-stock/Dockerfile
    container_name: flashsale_stock
    environment:
      SERVER_PORT: 8084
      NACOS_ADDR: nacos:8848
      STOCK_DATASOURCE_URL: jdbc:postgresql://postgres-master:5432/flashsale_db
    depends_on:
      - postgres-master
      - nacos
    ports:
      - "8084:8084"
    restart: always
  gateway:
    build:
      context: .
      dockerfile: ./gateway/Dockerfile
    container_name: flashsale_gateway
    environment:
      NACOS_ADDR: nacos:8848
      JWT_SECRET: flashsale_phase_b_secret_key_please_change
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      INTENT_FILTER_ENABLED: "true"
      INTENT_DEGRADE_TO_TOKEN_BUCKET: "true"
      TZ: Asia/Shanghai
    depends_on:
      - nacos
      - redis
    ports:
      - "9080:9080"
    restart: always
  bi:
    build:
      context: ./bi
      dockerfile: Dockerfile
    container_name: flashsale_bi
    profiles:
      - full
    environment:
      DB_URL: postgresql://host:hostpassword@postgres-master:5432/flashsale_db
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      TZ: Asia/Shanghai
    depends_on:
      - postgres-master
      - redis
    ports:
      - "8000:8000"
    restart: always
  nginx:
    image: ghcr.io/nginxinc/nginx-unprivileged:stable
    container_name: flashsale_nginx
    ports:
      - "80:8080"
    volumes:
      - ./src/main/resources/static:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - gateway
      - goods
      - goods-2
    restart: always

volumes:
  postgres_master_data:
  postgres_replica_data:
