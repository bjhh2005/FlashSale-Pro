server.port=8081
server.error.include-stacktrace=always
server.error.include-message=always
spring.application.name=flashsale-goods
spring.cloud.nacos.discovery.server-addr=${NACOS_ADDR:127.0.0.1:8848}

spring.datasource.url=jdbc:postgresql://127.0.0.1:15432/flashsale_db
spring.datasource.username=host
spring.datasource.password=hostpassword
spring.datasource.driver-class-name=org.postgresql.Driver
flashsale.datasource.read.url=${READ_DATASOURCE_URL:jdbc:postgresql://127.0.0.1:15433/flashsale_db}
flashsale.datasource.read.username=${READ_DATASOURCE_USERNAME:host}
flashsale.datasource.read.password=${READ_DATASOURCE_PASSWORD:hostpassword}
flashsale.datasource.read.driver-class-name=org.postgresql.Driver

mybatis.configuration.map-underscore-to-camel-case=true

spring.data.redis.host=${REDIS_HOST:127.0.0.1}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.timeout=2000ms

jwt.secret=flashsale_phase_b_secret_key_please_change
jwt.expire-seconds=7200
internal.api.token=phase_c_internal_token

flashsale.cache.goods.detail-ttl-seconds=300
flashsale.cache.goods.null-ttl-seconds=60
flashsale.cache.goods.ttl-jitter-seconds=120
flashsale.cache.goods.lock-seconds=10

management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always
logging.pattern.level=%5p [traceId:%X{traceId}]
